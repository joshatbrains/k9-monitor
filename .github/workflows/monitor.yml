name: CCI K9 Monitor

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run K9 check
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          SMS_ADDRESS: ${{ secrets.SMS_ADDRESS }}
        run: node check.js

      - name: Commit updated dog list
        run: |
          git config user.name "k9-monitor[bot]"
          git config user.email "k9-monitor@users.noreply.github.com"
          git add known-dogs.json || true
          git diff --cached --quiet || git commit -m "chore: update known dogs list [skip ci]"
          git push || true
